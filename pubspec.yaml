name: lucky_day
description: Lucky Day - Tentez votre chance et gagnez !
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  logger: ^2.0.0
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1  
  timeago: ^3.7.0
  image_picker: ^1.1.2
  http_parser: ^4.0.2
  carousel_slider: ^5.0.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  http: ^1.1.0
  lottie: ^3.1.0
  audioplayers: ^6.1.0
  country_picker: ^2.0.26

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - lib/assets/images/Lucky_day_logo.png
    - lib/assets/loaders/
    - lib/assets/sounds/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/images/Lucky_day_logo_background-free.png"